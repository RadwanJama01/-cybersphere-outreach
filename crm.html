<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersphere — Lead Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --text: #1A1A1A;
  --text-secondary: #4A5568;
  --text-tertiary: #8B95A5;
  --navy: #0D2545;
  --navy-light: #1A3A6B;
  --navy-faint: rgba(13,37,69,0.04);
  --border: #E5E7EB;
  --border-light: #F0F1F3;
  --green: #2D6A4F;
  --green-bg: rgba(45,106,79,0.06);
  --green-border: rgba(45,106,79,0.15);
  --yellow: #B7791F;
  --yellow-bg: rgba(183,121,31,0.06);
  --yellow-border: rgba(183,121,31,0.15);
  --red: #C0392B;
  --red-bg: rgba(192,57,43,0.06);
  --red-border: rgba(192,57,43,0.15);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

html { font-size: 15px; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Masthead ── */
.masthead {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 28px 40px 20px;
  border-bottom: 2px solid var(--navy);
  flex-shrink: 0;
}

.masthead-left { display: flex; flex-direction: column; gap: 4px; }

.firm-name {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--navy);
}

.masthead-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 28px; font-weight: 700;
  color: var(--navy); line-height: 1.15;
  letter-spacing: -0.01em;
}

.masthead-sub {
  font-size: 12px; font-weight: 400;
  color: var(--text-secondary); margin-top: 2px;
}

.masthead-right { display: flex; align-items: center; gap: 12px; }

.masthead-pill {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--white);
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}

.masthead-live {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--green-bg); color: var(--green);
  padding: 5px 12px; border-radius: 4px;
  border: 1px solid var(--green-border);
  display: flex; align-items: center; gap: 5px;
}

.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.refresh-badge {
  font-size: 10px; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 4px;
}

.refresh-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--green);
}

/* ── KPI Strip ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.kpi-mini {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
}

.kpi-mini-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 8px;
}

.kpi-mini-value {
  font-size: 24px; font-weight: 700;
  color: var(--navy); letter-spacing: -0.02em;
  margin-bottom: 2px;
}

.kpi-mini-sub { font-size: 11px; color: var(--text-tertiary); }

/* ── View Tabs ── */
.view-tabs {
  display: flex;
  padding: 0 40px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.view-tab {
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 12px 20px;
  border: none; cursor: pointer;
  background: transparent;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.view-tab:hover { color: var(--text-secondary); }
.view-tab.active { color: var(--navy); border-bottom-color: var(--navy); }

/* ── Main Layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

.view-panel { display: none; flex: 1; overflow: hidden; }
.view-panel.active { display: flex; }

/* ── Lead List Panel ── */
.lead-list-panel {
  width: 340px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
  background: var(--white);
}

.stage-tabs {
  display: flex; padding: 14px 20px; gap: 6px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}

.stage-tab {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500;
  padding: 5px 14px; border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer; background: transparent;
  color: var(--text-tertiary);
  letter-spacing: 0.02em; transition: all 0.15s;
}

.stage-tab:hover { background: var(--navy-faint); }
.stage-tab.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
.stage-tab .count { margin-left: 4px; opacity: 0.6; }

.lead-scroll { overflow-y: auto; flex: 1; }

.stage-group-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 16px 20px 8px;
  display: flex; align-items: center; gap: 6px;
}

.stage-dot { width: 5px; height: 5px; border-radius: 50%; }

.lead-card {
  padding: 14px 20px;
  border-left: 2.5px solid transparent;
  cursor: pointer; transition: all 0.15s;
  border-bottom: 1px solid var(--border-light);
}

.lead-card:hover { background: var(--navy-faint); }
.lead-card.selected { background: var(--navy-faint); border-left-color: var(--navy); }

.lead-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
.lead-name { font-size: 13px; font-weight: 600; color: var(--text); }

.badge-escalate {
  font-size: 9px; font-weight: 700;
  background: var(--red-bg); color: var(--red);
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--red-border);
  letter-spacing: 0.06em;
}

.lead-biz { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; }
.lead-card-bottom { display: flex; justify-content: space-between; align-items: center; }

.vertical-tag {
  font-size: 10px; font-weight: 500;
  padding: 2px 10px; border-radius: 4px; border: 1px solid;
}

.lead-value { font-size: 12px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }

/* ── Detail Panel ── */
.detail-panel {
  flex: 1; overflow-y: auto;
  padding: 28px 36px; background: var(--bg);
}

.detail-empty {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 14px; height: 100%;
}

.detail-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 24px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.detail-header-left { display: flex; align-items: center; gap: 12px; }

.detail-avatar {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white;
  flex-shrink: 0; letter-spacing: 0.02em;
}

.detail-name-row { display: flex; align-items: center; gap: 8px; }

.detail-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px; font-weight: 700; color: var(--navy);
}

.badge-escalate-lg {
  font-size: 10px; font-weight: 700;
  background: var(--red-bg); color: var(--red);
  padding: 3px 10px; border-radius: 4px;
  border: 1px solid var(--red-border);
  letter-spacing: 0.06em;
}

.detail-biz { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.detail-source {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--white); padding: 6px 14px;
  border-radius: 6px; border: 1px solid var(--border);
  white-space: nowrap; box-shadow: var(--shadow-sm);
}

.detail-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 20px;
}

.detail-stat {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 18px; box-shadow: var(--shadow-sm);
}

.detail-stat-label {
  font-size: 10px; font-weight: 600; color: var(--text-tertiary);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;
}

.detail-stat-value { font-size: 15px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

.detail-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px 22px;
  margin-bottom: 16px; box-shadow: var(--shadow-sm);
}

.detail-card-label {
  font-size: 10px; font-weight: 600; color: var(--text-tertiary);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}

.detail-notes { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

.timeline { display: flex; flex-direction: column; }
.timeline-item { display: flex; gap: 14px; position: relative; }
.timeline-track { display: flex; flex-direction: column; align-items: center; }

.timeline-dot {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 4px; flex-shrink: 0; z-index: 1;
  border: 2px solid var(--white);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
}

.timeline-line { width: 1px; flex: 1; background: var(--border); min-height: 18px; }
.timeline-content { padding-bottom: 14px; }
.timeline-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.timeline-time { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; font-variant-numeric: tabular-nums; }
.timeline-escalate .timeline-text { color: var(--red); font-weight: 600; }

.detail-actions { display: flex; gap: 8px; margin-top: 4px; }

.btn-primary {
  flex: 1; font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 11px 20px; border-radius: 6px;
  border: none; cursor: pointer; color: white;
  letter-spacing: 0.02em; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary.navy { background: var(--navy); }
.btn-primary.green-btn { background: var(--green); }

.btn-secondary {
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 11px 20px; border-radius: 6px;
  border: 1px solid var(--navy); cursor: pointer;
  background: var(--white); color: var(--navy);
  letter-spacing: 0.02em; transition: background 0.15s, color 0.15s;
}
.btn-secondary:hover { background: var(--navy); color: var(--white); }

/* ── Post Log View ── */
.post-log-panel {
  flex: 1; overflow-y: auto;
  padding: 28px 40px; background: var(--bg);
}

.post-log-table {
  width: 100%; border-collapse: collapse;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.post-log-table thead th {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
  text-align: left;
  padding: 14px 18px;
  border-bottom: 1.5px solid var(--border);
  background: var(--bg);
}

.post-log-table tbody td {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  vertical-align: top;
  font-size: 13px; color: var(--text);
}

.post-log-table tbody tr:last-child td { border-bottom: none; }
.post-log-table tbody tr:hover { background: var(--navy-faint); }

.post-text-cell {
  max-width: 400px;
  font-size: 12px; color: var(--text-secondary);
  line-height: 1.5;
}

.guardrail-tags { display: flex; flex-wrap: wrap; gap: 4px; }

.guardrail-tag {
  font-size: 9px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
  letter-spacing: 0.04em; text-transform: uppercase;
  background: var(--green-bg); color: var(--green);
  border: 1px solid var(--green-border);
}

.status-posted {
  font-size: 10px; font-weight: 600;
  color: var(--green); text-transform: uppercase;
  letter-spacing: 0.06em;
}

.status-dryrun {
  font-size: 10px; font-weight: 600;
  color: var(--yellow); text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Scrollbar */
.lead-scroll::-webkit-scrollbar,
.detail-panel::-webkit-scrollbar,
.post-log-panel::-webkit-scrollbar { width: 4px; }
.lead-scroll::-webkit-scrollbar-track,
.detail-panel::-webkit-scrollbar-track,
.post-log-panel::-webkit-scrollbar-track { background: transparent; }
.lead-scroll::-webkit-scrollbar-thumb,
.detail-panel::-webkit-scrollbar-thumb,
.post-log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (max-width: 900px) {
  .kpi-strip { grid-template-columns: repeat(2, 1fr); padding: 16px 20px; }
  .masthead { padding: 20px 20px 16px; }
  .view-panel.active { flex-direction: column; }
  .lead-list-panel { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
  .detail-panel { padding: 20px; }
  .detail-stats { grid-template-columns: 1fr; }
  .masthead-pill { display: none; }
  .post-log-panel { padding: 16px 20px; }
}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <div class="firm-name">Cybersphere</div>
    <div class="masthead-title">Lead Pipeline</div>
    <div class="masthead-sub">Live CRM — auto-refreshes every 30 seconds from data.json</div>
  </div>
  <div class="masthead-right">
    <div class="refresh-badge" id="refreshBadge"><div class="refresh-dot"></div> Synced just now</div>
    <div class="masthead-pill">AI Receptionist: +1 (325) 240-6238</div>
    <div class="masthead-live"><div class="live-dot"></div> Live</div>
  </div>
</div>

<div class="kpi-strip" id="kpiStrip"></div>

<div class="view-tabs">
  <button class="view-tab active" data-view="leads">Leads</button>
  <button class="view-tab" data-view="postlog">Post Log</button>
</div>

<div class="main">
  <!-- Leads View -->
  <div class="view-panel active" id="leadsView">
    <div class="lead-list-panel">
      <div class="stage-tabs" id="stageTabs"></div>
      <div class="lead-scroll" id="leadScroll"></div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">Select a lead to view details</div>
    </div>
  </div>

  <!-- Post Log View -->
  <div class="view-panel" id="postlogView">
    <div class="post-log-panel" id="postLogPanel"></div>
  </div>
</div>

<script>
// ── Demo fallback data ──
const DEMO_LEADS = [
  { id:"demo_1", name:"Dr. Michael Torres", biz:"Torres Dental Group", vertical:"dental", stage:"outreach", source:"Dental Practice Owners USA", phone:"(415) 882-9001", callStatus:"Called receptionist", notes:"Asked about pricing after calling +1 (325) 240-6238. Said \u2018that thing is scary good.\u2019", timeline:[{color:"#1A3A6B",text:"Posted to Dental Practice Owners USA",time:"9:14 AM"},{color:"#B7791F",text:"Commented: \u2018what is this?\u2019",time:"10:02 AM"},{color:"#B7791F",text:"Called AI receptionist",time:"10:15 AM"},{color:"#2D6A4F",text:"DM sent: intro + booking link",time:"10:16 AM"}], value:"$2,400/mo" },
  { id:"demo_2", name:"Sarah Chen", biz:"Chen & Patel Law Firm", vertical:"legal", stage:"outreach", source:"Personal Injury Industry", phone:"(212) 774-3322", callStatus:"No call yet", notes:"Commented \u2018interested, DM me.\u2019 First response sent.", timeline:[{color:"#1A3A6B",text:"Posted to Personal Injury Industry",time:"7:31 AM"},{color:"#B7791F",text:"Commented: \u2018interested, DM me\u2019",time:"9:45 AM"},{color:"#2D6A4F",text:"First-response DM sent",time:"9:46 AM"}], value:"$3,200/mo" },
  { id:"demo_3", name:"Marcus Williams", biz:"MW Properties LLC", vertical:"real estate", stage:"outreach", source:"Multi Family Properties For Sale", phone:"(347) 901-4455", callStatus:"Called receptionist", notes:"Manages 12 units. Said he misses 40% of tenant calls after 6pm.", timeline:[{color:"#1A3A6B",text:"Posted to Multi Family Properties For Sale",time:"7:08 AM"},{color:"#B7791F",text:"Called AI receptionist",time:"8:22 AM"},{color:"#2D6A4F",text:"Follow-up DM sent with RE angle",time:"8:36 AM"}], value:"$1,800/mo" },
  { id:"demo_4", name:"Amanda Torres", biz:"Torres & Associates PI", vertical:"legal", stage:"followup", source:"Law Firm Owners and Managers", phone:"(305) 774-9932", callStatus:"Called receptionist", notes:"Asked about custom intake questions for PI cases. ESCALATE TO TEAM.", timeline:[{color:"#1A3A6B",text:"Posted to Law Firm Owners",time:"Day 1 8AM"},{color:"#B7791F",text:"Called AI receptionist",time:"Day 1 10AM"},{color:"#C0392B",text:"ESCALATE: custom PI intake",time:"Day 2 11AM",escalate:true}], value:"$4,200/mo", escalate:true },
  { id:"demo_5", name:"David Nguyen", biz:"Nguyen Plumbing Co", vertical:"hvac", stage:"followup", source:"Professional Plumbers", phone:"(214) 881-6612", callStatus:"Called receptionist", notes:"Runs a 3-truck operation. Misses 15+ calls a day. Booked a demo call.", timeline:[{color:"#1A3A6B",text:"Posted to Professional Plumbers",time:"Day 1 5PM"},{color:"#B7791F",text:"Called AI receptionist",time:"Day 1 6PM"},{color:"#2D6A4F",text:"Booked demo call via AI",time:"Day 1 6:05PM"}], value:"$1,800/mo" },
  { id:"demo_6", name:"Jennifer Osei", biz:"Osei Dental Spa", vertical:"dental", stage:"closing", source:"Dental Practice Owners USA", phone:"(404) 772-8843", callStatus:"Demo call done", notes:"Demo call completed. Ready to sign. Waiting on contract.", timeline:[{color:"#1A3A6B",text:"Original post reply",time:"Day 1"},{color:"#B7791F",text:"Called AI receptionist",time:"Day 1"},{color:"#2D6A4F",text:"Demo call completed",time:"Day 3"},{color:"#2D6A4F",text:"Contract sent",time:"Day 3"}], value:"$2,400/mo" },
  { id:"demo_7", name:"Thomas Bradley", biz:"Bradley Law Group", vertical:"legal", stage:"closing", source:"National PI Lawyers Association", phone:"(312) 884-7721", callStatus:"Contract sent", notes:"PI firm in Chicago. Handles 200+ calls/month. Contract sent, reviewing.", timeline:[{color:"#1A3A6B",text:"Original post reply",time:"Day 1"},{color:"#B7791F",text:"Called AI receptionist x3",time:"Day 1"},{color:"#2D6A4F",text:"Demo call completed",time:"Day 2"},{color:"#2D6A4F",text:"Contract sent \u2014 $3,200/mo",time:"Day 4"}], value:"$3,200/mo" },
];

const DEMO_META = { weeklyPosts: 3, totalLeads: 7, callsToReceptionist: 5, pipelineValue: 11600 };

// ── State ──
let crmData = { meta: DEMO_META, leads: DEMO_LEADS, postLog: [] };
let selectedId = null;
let activeStage = "all";
let activeView = "leads";
let lastFetchTime = null;

const verticalColors = {
  dental:        { color: "#1A3A6B", bg: "rgba(26,58,107,0.06)", border: "rgba(26,58,107,0.15)" },
  legal:         { color: "#6B21A8", bg: "rgba(107,33,168,0.06)", border: "rgba(107,33,168,0.15)" },
  "real estate": { color: "#2D6A4F", bg: "rgba(45,106,79,0.06)", border: "rgba(45,106,79,0.15)" },
  auto:          { color: "#92400E", bg: "rgba(146,64,14,0.06)", border: "rgba(146,64,14,0.15)" },
  hvac:          { color: "#9A3412", bg: "rgba(154,52,18,0.06)", border: "rgba(154,52,18,0.15)" },
  general:       { color: "#4A5568", bg: "rgba(74,85,104,0.06)", border: "rgba(74,85,104,0.15)" },
};

const stageConfig = {
  outreach: { label: "Outreach replied", color: "#1A3A6B" },
  followup: { label: "Follow-up active", color: "#B7791F" },
  closing:  { label: "Closing / booked", color: "#2D6A4F" },
};

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function parseValue(v) { return parseInt((v||"0").replace(/[$,\/mo\s]/g, ""), 10) || 0; }

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  return days + "d ago";
}

// ── Fetch data.json ──
async function fetchData() {
  try {
    const res = await fetch("data.json?_=" + Date.now());
    if (!res.ok) throw new Error("No data.json");
    const data = await res.json();
    // Merge: use live data if it has leads, else keep demo
    if (data.leads && data.leads.length > 0) {
      crmData.leads = data.leads;
    } else {
      crmData.leads = DEMO_LEADS;
    }
    crmData.postLog = data.postLog || [];
    crmData.meta = data.meta || DEMO_META;
    // Recalculate if meta doesn't have totalLeads
    if (!crmData.meta.totalLeads) crmData.meta.totalLeads = crmData.leads.length;
    lastFetchTime = new Date();
    document.getElementById("refreshBadge").innerHTML =
      '<div class="refresh-dot"></div> Synced ' + timeAgo(lastFetchTime.toISOString());
  } catch (e) {
    // Use demo data — no data.json yet
    lastFetchTime = new Date();
  }
  renderAll();
}

function renderAll() {
  renderKPIs();
  renderTabs();
  renderLeadList();
  renderDetail();
  renderPostLog();
}

// ── View Tabs ──
document.querySelectorAll(".view-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeView = tab.dataset.view;
    document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
    document.getElementById(activeView + "View").classList.add("active");
  });
});

// ── KPIs ──
function renderKPIs() {
  const m = crmData.meta;
  const leads = crmData.leads;
  const pipeline = leads
    .filter(l => l.stage === "closing" || l.stage === "followup")
    .reduce((s, l) => s + parseValue(l.value), 0);
  const stats = [
    { label: "Posts this week", value: String(m.weeklyPosts || 0), sub: "from post log" },
    { label: "Leads in pipeline", value: String(leads.length), sub: "all stages" },
    { label: "Calls to receptionist", value: String(m.callsToReceptionist || leads.filter(l => l.callStatus !== "No call yet").length), sub: "this week" },
    { label: "Pipeline value", value: "$" + (pipeline || m.pipelineValue || 0).toLocaleString() + "/mo", sub: "follow-up + closing" },
    { label: "Post log entries", value: String((crmData.postLog || []).length), sub: "all time" },
  ];
  document.getElementById("kpiStrip").innerHTML = stats.map(s => `
    <div class="kpi-mini">
      <div class="kpi-mini-label">${esc(s.label)}</div>
      <div class="kpi-mini-value">${esc(s.value)}</div>
      <div class="kpi-mini-sub">${esc(s.sub)}</div>
    </div>`).join("");
}

// ── Stage Tabs ──
function renderTabs() {
  const leads = crmData.leads;
  const tabs = ["all", "outreach", "followup", "closing"];
  document.getElementById("stageTabs").innerHTML = tabs.map(s => {
    const count = s === "all" ? leads.length : leads.filter(l => l.stage === s).length;
    const label = s === "all" ? "All leads" : stageConfig[s].label;
    return `<button class="stage-tab ${activeStage === s ? "active" : ""}" data-stage="${s}">${esc(label)}<span class="count">${count}</span></button>`;
  }).join("");
  document.querySelectorAll(".stage-tab").forEach(btn => {
    btn.addEventListener("click", () => { activeStage = btn.dataset.stage; renderTabs(); renderLeadList(); });
  });
}

// ── Lead List ──
function renderLeadList() {
  const leads = crmData.leads;
  const filtered = activeStage === "all" ? leads : leads.filter(l => l.stage === activeStage);
  let html = "";
  if (filtered.length === 0) {
    html = '<div style="padding:40px 20px;text-align:center;color:var(--text-tertiary);font-size:13px">No leads yet. Cowork will populate this when leads come in.</div>';
  } else {
    ["outreach", "followup", "closing"].forEach(stage => {
      const sl = filtered.filter(l => l.stage === stage);
      if (!sl.length) return;
      const cfg = stageConfig[stage];
      html += `<div class="stage-group-label" style="color:${cfg.color}"><div class="stage-dot" style="background:${cfg.color}"></div>${esc(cfg.label)}</div>`;
      sl.forEach(lead => {
        const vc = verticalColors[lead.vertical] || verticalColors.general;
        const sel = selectedId === lead.id;
        html += `<div class="lead-card ${sel ? "selected" : ""}" data-id="${esc(lead.id)}">
          <div class="lead-card-top">
            <span class="lead-name">${esc(lead.name)}</span>
            ${lead.escalate ? '<span class="badge-escalate">ESCALATE</span>' : ""}
          </div>
          <div class="lead-biz">${esc(lead.biz)}</div>
          <div class="lead-card-bottom">
            <span class="vertical-tag" style="background:${vc.bg};color:${vc.color};border-color:${vc.border}">${esc(lead.vertical)}</span>
            <span class="lead-value">${esc(lead.value)}</span>
          </div>
        </div>`;
      });
    });
  }
  document.getElementById("leadScroll").innerHTML = html;
  document.querySelectorAll(".lead-card").forEach(c => {
    c.addEventListener("click", () => { selectedId = c.dataset.id; renderLeadList(); renderDetail(); });
  });
}

// ── Detail Panel ──
function renderDetail() {
  const lead = crmData.leads.find(l => l.id === selectedId);
  const panel = document.getElementById("detailPanel");
  if (!lead) { panel.innerHTML = '<div class="detail-empty">Select a lead to view details</div>'; return; }
  const initials = lead.name.split(" ").map(n => n[0]).join("").slice(0, 2);
  const btnLabel = lead.stage === "closing" ? "Mark closed won" : lead.stage === "followup" ? "Send second touch" : "Send follow-up DM";
  const btnClass = lead.stage === "closing" ? "green-btn" : "navy";
  const callStatus = lead.callStatus || lead.call_status || "Unknown";

  const tl = (lead.timeline || []).map((t, i) => `
    <div class="timeline-item ${t.escalate ? "timeline-escalate" : ""}">
      <div class="timeline-track">
        <div class="timeline-dot" style="background:${t.color}"></div>
        ${i < lead.timeline.length - 1 ? '<div class="timeline-line"></div>' : ""}
      </div>
      <div class="timeline-content">
        <div class="timeline-text">${esc(t.text)}</div>
        <div class="timeline-time">${esc(t.time)}</div>
      </div>
    </div>`).join("");

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-avatar">${esc(initials)}</div>
        <div>
          <div class="detail-name-row">
            <span class="detail-name">${esc(lead.name)}</span>
            ${lead.escalate ? '<span class="badge-escalate-lg">ESCALATE TO TEAM</span>' : ""}
          </div>
          <div class="detail-biz">${esc(lead.biz)}</div>
        </div>
      </div>
      <div class="detail-source">from ${esc(lead.source)}</div>
    </div>
    <div class="detail-stats">
      ${[{l:"Pipeline value",v:lead.value},{l:"Phone",v:lead.phone||"\u2014"},{l:"Call status",v:callStatus}].map(s => `
        <div class="detail-stat">
          <div class="detail-stat-label">${esc(s.l)}</div>
          <div class="detail-stat-value">${esc(s.v)}</div>
        </div>`).join("")}
    </div>
    <div class="detail-card">
      <div class="detail-card-label">Agent notes</div>
      <div class="detail-notes">${esc(lead.notes)}</div>
    </div>
    <div class="detail-card">
      <div class="detail-card-label">Activity timeline</div>
      <div class="timeline">${tl || '<div style="font-size:12px;color:var(--text-tertiary)">No activity yet</div>'}</div>
    </div>
    <div class="detail-actions">
      <button class="btn-primary ${btnClass}">${esc(btnLabel)}</button>
      <button class="btn-secondary">Move stage</button>
      <button class="btn-secondary">Log note</button>
    </div>`;
}

// ── Post Log ──
function renderPostLog() {
  const posts = crmData.postLog || [];
  if (posts.length === 0) {
    document.getElementById("postLogPanel").innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text-tertiary)">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px">No posts logged yet</div>
        <div style="font-size:12px">When Cowork posts to Facebook groups, each post will appear here with full guardrail audit.</div>
      </div>`;
    return;
  }

  let rows = posts.map(p => {
    const status = p.status === "posted"
      ? '<span class="status-posted">Posted</span>'
      : '<span class="status-dryrun">Dry Run</span>';
    const guardrails = (p.guardrailsPassed || []).map(g =>
      `<span class="guardrail-tag">${esc(g)}</span>`
    ).join("");
    const ts = p.timestamp ? new Date(p.timestamp).toLocaleString() : "\u2014";
    const vc = verticalColors[p.vertical] || verticalColors.general;

    return `<tr>
      <td style="white-space:nowrap;font-size:12px;color:var(--text-tertiary)">${esc(ts)}</td>
      <td>
        <div style="font-size:13px;font-weight:600">${esc(p.group)}</div>
        <span class="vertical-tag" style="background:${vc.bg};color:${vc.color};border-color:${vc.border};font-size:9px;margin-top:4px;display:inline-block">${esc(p.vertical)}</span>
      </td>
      <td class="post-text-cell">${esc((p.postText || "").substring(0, 150))}${(p.postText||"").length > 150 ? "..." : ""}</td>
      <td>${status}</td>
      <td><div class="guardrail-tags">${guardrails}</div></td>
    </tr>`;
  }).join("");

  document.getElementById("postLogPanel").innerHTML = `
    <table class="post-log-table">
      <thead><tr>
        <th>Time</th>
        <th>Group</th>
        <th>Post text</th>
        <th>Status</th>
        <th>Guardrails</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Init + auto-refresh ──
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
