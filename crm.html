<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersphere — Lead Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --text: #1A1A1A;
  --text-secondary: #4A5568;
  --text-tertiary: #8B95A5;
  --navy: #0D2545;
  --navy-light: #1A3A6B;
  --navy-faint: rgba(13,37,69,0.04);
  --border: #E5E7EB;
  --border-light: #F0F1F3;
  --green: #2D6A4F;
  --green-bg: rgba(45,106,79,0.06);
  --green-border: rgba(45,106,79,0.15);
  --yellow: #B7791F;
  --yellow-bg: rgba(183,121,31,0.06);
  --yellow-border: rgba(183,121,31,0.15);
  --red: #C0392B;
  --red-bg: rgba(192,57,43,0.06);
  --red-border: rgba(192,57,43,0.15);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

html { font-size: 15px; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Masthead ── */
.masthead {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 28px 40px 20px;
  border-bottom: 2px solid var(--navy);
  flex-shrink: 0;
}

.masthead-left { display: flex; flex-direction: column; gap: 4px; }

.firm-name {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--navy);
}

.masthead-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 28px; font-weight: 700;
  color: var(--navy); line-height: 1.15;
  letter-spacing: -0.01em;
}

.masthead-sub {
  font-size: 12px; font-weight: 400;
  color: var(--text-secondary); margin-top: 2px;
}

.masthead-right {
  display: flex; align-items: center; gap: 12px;
}

.masthead-pill {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--white);
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.masthead-live {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--green-bg);
  color: var(--green);
  padding: 5px 12px; border-radius: 4px;
  border: 1px solid var(--green-border);
  display: flex; align-items: center; gap: 5px;
}

.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── KPI Strip ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.kpi-mini {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
}

.kpi-mini-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.kpi-mini-value {
  font-size: 24px; font-weight: 700;
  color: var(--navy); letter-spacing: -0.02em;
  margin-bottom: 2px;
}

.kpi-mini-sub { font-size: 11px; color: var(--text-tertiary); }

/* ── Main Layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left Panel ── */
.lead-list-panel {
  width: 340px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--white);
}

.stage-tabs {
  display: flex;
  padding: 14px 20px;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.stage-tab {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500;
  padding: 5px 14px; border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
  transition: all 0.15s;
}

.stage-tab:hover { background: var(--navy-faint); }
.stage-tab.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
.stage-tab .count { margin-left: 4px; opacity: 0.6; }

.lead-scroll { overflow-y: auto; flex: 1; }

.stage-group-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 16px 20px 8px;
  display: flex; align-items: center; gap: 6px;
}

.stage-dot { width: 5px; height: 5px; border-radius: 50%; }

.lead-card {
  padding: 14px 20px;
  border-left: 2.5px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  border-bottom: 1px solid var(--border-light);
}

.lead-card:hover { background: var(--navy-faint); }
.lead-card.selected { background: var(--navy-faint); border-left-color: var(--navy); }

.lead-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 3px;
}

.lead-name { font-size: 13px; font-weight: 600; color: var(--text); }

.badge-escalate {
  font-size: 9px; font-weight: 700;
  background: var(--red-bg); color: var(--red);
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--red-border);
  letter-spacing: 0.06em;
}

.lead-biz { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; }

.lead-card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.vertical-tag {
  font-size: 10px; font-weight: 500;
  padding: 2px 10px; border-radius: 4px;
  border: 1px solid;
}

.lead-value {
  font-size: 12px; font-weight: 700;
  color: var(--green);
  font-variant-numeric: tabular-nums;
}

/* ── Right Panel ── */
.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
  background: var(--bg);
}

.detail-empty {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 14px; height: 100%;
}

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.detail-header-left { display: flex; align-items: center; gap: 12px; }

.detail-avatar {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white;
  flex-shrink: 0; letter-spacing: 0.02em;
}

.detail-name-row { display: flex; align-items: center; gap: 8px; }

.detail-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px; font-weight: 700;
  color: var(--navy);
}

.badge-escalate-lg {
  font-size: 10px; font-weight: 700;
  background: var(--red-bg); color: var(--red);
  padding: 3px 10px; border-radius: 4px;
  border: 1px solid var(--red-border);
  letter-spacing: 0.06em;
}

.detail-biz { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.detail-source {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--white);
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  white-space: nowrap; box-shadow: var(--shadow-sm);
}

.detail-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.detail-stat {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}

.detail-stat-label {
  font-size: 10px; font-weight: 600; color: var(--text-tertiary);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 6px;
}

.detail-stat-value {
  font-size: 15px; font-weight: 700; color: var(--text);
  font-variant-numeric: tabular-nums;
}

.detail-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 22px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}

.detail-card-label {
  font-size: 10px; font-weight: 600; color: var(--text-tertiary);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 10px;
}

.detail-notes {
  font-size: 13px; color: var(--text-secondary); line-height: 1.7;
}

/* Timeline */
.timeline { display: flex; flex-direction: column; }

.timeline-item { display: flex; gap: 14px; position: relative; }
.timeline-track { display: flex; flex-direction: column; align-items: center; }

.timeline-dot {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 4px; flex-shrink: 0; z-index: 1;
  border: 2px solid var(--white);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
}

.timeline-line {
  width: 1px; flex: 1;
  background: var(--border);
  min-height: 18px;
}

.timeline-content { padding-bottom: 14px; }
.timeline-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

.timeline-time {
  font-size: 10px; color: var(--text-tertiary); margin-top: 2px;
  font-variant-numeric: tabular-nums;
}

.timeline-escalate .timeline-text { color: var(--red); font-weight: 600; }

/* Actions */
.detail-actions { display: flex; gap: 8px; margin-top: 4px; }

.btn-primary {
  flex: 1; font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 11px 20px; border-radius: 6px;
  border: none; cursor: pointer; color: white;
  letter-spacing: 0.02em; transition: opacity 0.15s;
}

.btn-primary:hover { opacity: 0.9; }
.btn-primary.navy { background: var(--navy); }
.btn-primary.green-btn { background: var(--green); }

.btn-secondary {
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 11px 20px; border-radius: 6px;
  border: 1px solid var(--navy);
  cursor: pointer; background: var(--white);
  color: var(--navy); letter-spacing: 0.02em;
  transition: background 0.15s, color 0.15s;
}

.btn-secondary:hover { background: var(--navy); color: var(--white); }

/* Scrollbar */
.lead-scroll::-webkit-scrollbar,
.detail-panel::-webkit-scrollbar { width: 4px; }
.lead-scroll::-webkit-scrollbar-track,
.detail-panel::-webkit-scrollbar-track { background: transparent; }
.lead-scroll::-webkit-scrollbar-thumb,
.detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (max-width: 900px) {
  .kpi-strip { grid-template-columns: repeat(2, 1fr); padding: 16px 20px; }
  .masthead { padding: 20px 20px 16px; }
  .main { flex-direction: column; }
  .lead-list-panel { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
  .detail-panel { padding: 20px; }
  .detail-stats { grid-template-columns: 1fr; }
  .masthead-pill { display: none; }
}
</style>
</head>

const verticalColors = {
  dental:        { color: "#1A3A6B", bg: "rgba(26,58,107,0.06)", border: "rgba(26,58,107,0.15)" },

  auto:          { color: "#92400E", bg: "rgba(146,64,14,0.06)", border: "rgba(146,64,14,0.15)" },
  hvac:          { color: "#9A3412", bg: "rgba(154,52,18,0.06)", border: "rgba(154,52,18,0.15)" },
};

const stageConfig = {
  outreach: { label: "Outreach replied", color: "#1A3A6B" },
  followup: { label: "Follow-up active", color: "#B7791F" },
  closing:  { label: "Closing / booked", color: "#2D6A4F" },
};

let selectedId = 1;
let activeStage = "all";

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function parseValue(v) { return parseInt(v.replace(/[$,\/mo]/g, ""), 10) || 0; }

function renderKPIs() {
  const pipeline = leads
    .filter(l => l.stage === "closing" || l.stage === "followup")
    .reduce((s, l) => s + parseValue(l.value), 0);
  const stats = [
    { label: "Posts this week", value: "47", sub: "across 12 groups" },
    { label: "Leads in pipeline", value: String(leads.length), sub: "3 stages active" },
    { label: "Calls to receptionist", value: "9", sub: "this week" },
    { label: "Pipeline value", value: "$" + pipeline.toLocaleString() + "/mo", sub: "follow-up + closing" },
  ];
  document.getElementById("kpiStrip").innerHTML = stats.map(s => `
    <div class="kpi-mini">
      <div class="kpi-mini-label">${esc(s.label)}</div>
      <div class="kpi-mini-value">${esc(s.value)}</div>
      <div class="kpi-mini-sub">${esc(s.sub)}</div>
    </div>`).join("");
}

    const label = s === "all" ? "All leads" : stageConfig[s].label;
    return `<button class="stage-tab ${activeStage === s ? "active" : ""}" data-stage="${s}">${esc(label)}<span class="count">${count}</span></button>`;
  }).join("");
  document.querySelectorAll(".stage-tab").forEach(btn => {
    btn.addEventListener("click", () => { activeStage = btn.dataset.stage; renderTabs(); renderLeadList(); });
  });
}

function renderLeadList() {
  const filtered = activeStage === "all" ? leads : leads.filter(l => l.stage === activeStage);
  let html = "";
  ["outreach", "followup", "closing"].forEach(stage => {
    const sl = filtered.filter(l => l.stage === stage);
    if (!sl.length) return;
    const cfg = stageConfig[stage];
    html += `<div class="stage-group-label" style="color:${cfg.color}"><div class="stage-dot" style="background:${cfg.color}"></div>${esc(cfg.label)}</div>`;
    sl.forEach(lead => {
      const vc = verticalColors[lead.vertical] || verticalColors.dental;
      const sel = selectedId === lead.id;
      html += `<div class="lead-card ${sel ? "selected" : ""}" data-id="${lead.id}">
        <div class="lead-card-top">
          <span class="lead-name">${esc(lead.name)}</span>
          ${lead.escalate ? '<span class="badge-escalate">ESCALATE</span>' : ""}
        </div>
        <div class="lead-biz">${esc(lead.biz)}</div>
        <div class="lead-card-bottom">
          <span class="vertical-tag" style="background:${vc.bg};color:${vc.color};border-color:${vc.border}">${esc(lead.vertical)}</span>
          <span class="lead-value">${esc(lead.value)}</span>
        </div>
      </div>`;
    });
  });
  document.getElementById("leadScroll").innerHTML = html;
  document.querySelectorAll(".lead-card").forEach(c => {
    c.addEventListener("click", () => { selectedId = parseInt(c.dataset.id, 10); renderLeadList(); renderDetail(); });
  });
}

function renderDetail() {
  const lead = leads.find(l => l.id === selectedId);
  const panel = document.getElementById("detailPanel");
  if (!lead) { panel.innerHTML = '<div class="detail-empty">Select a lead to view details</div>'; return; }
  const initials = lead.name.split(" ").map(n => n[0]).join("").slice(0, 2);
  const btnLabel = lead.stage === "closing" ? "Mark closed won" : lead.stage === "followup" ? "Send second touch" : "Send follow-up DM";
  const btnClass = lead.stage === "closing" ? "green-btn" : "navy";
  const tl = lead.timeline.map((t, i) => `
    <div class="timeline-item ${t.escalate ? "timeline-escalate" : ""}">
      <div class="timeline-track">
        <div class="timeline-dot" style="background:${t.color}"></div>
        ${i < lead.timeline.length - 1 ? '<div class="timeline-line"></div>' : ""}
      </div>
      <div class="timeline-content">
        <div class="timeline-text">${esc(t.text)}</div>
        <div class="timeline-time">${esc(t.time)}</div>
      </div>
    </div>`).join("");

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-avatar">${esc(initials)}</div>
        <div>
          <div class="detail-name-row">
            <span class="detail-name">${esc(lead.name)}</span>
            ${lead.escalate ? '<span class="badge-escalate-lg">ESCALATE TO TEAM</span>' : ""}
          </div>
          <div class="detail-biz">${esc(lead.biz)}</div>
        </div>
      </div>
      <div class="detail-source">from ${esc(lead.source)}</div>
    </div>
    <div class="detail-stats">
      ${[{l:"Pipeline value",v:lead.value},{l:"Phone",v:lead.phone},{l:"Call status",v:lead.call_status}].map(s => `
        <div class="detail-stat">
          <div class="detail-stat-label">${esc(s.l)}</div>
          <div class="detail-stat-value">${esc(s.v)}</div>
        </div>`).join("")}
    </div>
    <div class="detail-card">
      <div class="detail-card-label">Agent notes</div>
      <div class="detail-notes">${esc(lead.notes)}</div>
    </div>
    <div class="detail-card">
      <div class="detail-card-label">Activity timeline</div>
      <div class="timeline">${tl}</div>
    </div>
    <div class="detail-actions">
      <button class="btn-primary ${btnClass}">${esc(btnLabel)}</button>
      <button class="btn-secondary">Move stage</button>
      <button class="btn-secondary">Log note</button>
    </div>`;
}

renderKPIs();
renderTabs();
renderLeadList();
renderDetail();
</script>
</body>
</html>
